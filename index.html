<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수업 출석 체크</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { font-family: 'Pretendard', sans-serif; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease-out forwards; }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spin { animation: spin 0.9s linear infinite; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col items-center justify-center p-4">

  <div id="app" class="w-full max-w-sm"></div>

  <script>
    /* ─────────────────────────────────────────────
       ✏️  선생님 설정 영역
    ───────────────────────────────────────────── */
    const SCRIPT_URL  = "https://script.google.com/macros/s/AKfycbwNTLHlwscGJvkxtCcW5JqZ3QUUH5Iu_9zGsUP3RwYrdoikGe6C4JsYnMDi0RjNs9AlBQ/exec";  // Google Apps Script 웹앱 URL
    const CLASS_LABEL = "2026 융합과학콘서트 출석부";                       // 수업명 (화면에 표시)
    /* ─────────────────────────────────────────────*/

    // ── 상태 ──
    let state = {
      screen: "form",   // form | loading | success | already | not_found | error
      id:   "",
      name: "",
      time: "",
      errorMsg: "",
      validationError: ""
    };

    // ── 화면 렌더 ──
    function render() {
      document.getElementById("app").innerHTML = screens[state.screen]();
    }

    const screens = {

      // ── 입력 폼 ──
      form() {
        return `
          <div class="fade-in bg-slate-800 rounded-2xl shadow-2xl overflow-hidden border border-slate-700">
            <div class="h-1 bg-gradient-to-r from-purple-500 to-fuchsia-500"></div>
            <div class="p-8">
              <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-purple-500/20 border border-purple-500/30 flex items-center justify-center">
                  <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="text-purple-400">
                    <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                  </svg>
                </div>
                <h1 class="text-2xl font-bold text-white">${CLASS_LABEL}</h1>
                <p class="text-slate-400 text-sm mt-1">출석 체크</p>
              </div>

              <div class="space-y-4 mb-6">
                <div>
                  <label class="block text-sm font-medium text-slate-400 mb-2">학번</label>
                  <input type="text" id="inp-id" value="${state.id}"
                    placeholder="예: 30101"
                    inputmode="numeric"
                    class="w-full bg-slate-950 border border-slate-600 rounded-xl px-4 py-3 text-white text-lg focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all"
                    autocomplete="off" />
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-400 mb-2">이름</label>
                  <input type="text" id="inp-name" value="${state.name}"
                    placeholder="예: 홍길동"
                    class="w-full bg-slate-950 border border-slate-600 rounded-xl px-4 py-3 text-white text-lg focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all"
                    autocomplete="off" />
                </div>
              </div>

              ${state.validationError ? `
                <div class="flex items-center gap-2 bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3 mb-4 text-red-300 text-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
                  ${state.validationError}
                </div>
              ` : ""}

              <button onclick="handleSubmit()"
                class="w-full bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-purple-500 hover:to-fuchsia-500 text-white font-bold py-4 rounded-xl transition-all duration-200 shadow-lg shadow-purple-900/40 text-lg flex items-center justify-center gap-2">
                출석 확인하기
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
              </button>

              <p class="text-center text-xs text-slate-600 mt-5">명단에 등록된 학번·이름과 정확히 일치해야 합니다</p>
            </div>
          </div>
        `;
      },

      // ── 로딩 ──
      loading() {
        return `
          <div class="fade-in bg-slate-800 rounded-2xl p-10 border border-slate-700 shadow-2xl text-center">
            <div class="w-14 h-14 mx-auto mb-5 rounded-full border-4 border-slate-700 border-t-purple-500 spin"></div>
            <p class="text-slate-300 text-lg font-medium">명단 확인 중...</p>
            <p class="text-slate-500 text-sm mt-1">${state.name} 학생</p>
          </div>
        `;
      },

      // ── 출석 완료 ──
      success() {
        const now = new Date();
        const dateStr = now.toLocaleDateString("ko-KR", { month: "long", day: "numeric", weekday: "short" });
        return `
          <div class="fade-in bg-slate-800 rounded-2xl overflow-hidden border border-emerald-500/30 shadow-2xl">
            <div class="h-1 bg-gradient-to-r from-emerald-500 to-teal-500"></div>
            <div class="p-8 text-center">
              <div class="w-20 h-20 mx-auto mb-5 rounded-full bg-emerald-500/20 border-2 border-emerald-500/40 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-400"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
              </div>
              <h2 class="text-2xl font-bold text-emerald-400 mb-1">출석 완료!</h2>
              <p class="text-white text-xl font-semibold mb-1">${state.name} 학생</p>
              <p class="text-slate-400 text-sm">${CLASS_LABEL} · ${dateStr}</p>

              <div class="bg-slate-900 rounded-xl p-4 mt-6 mb-6 border border-slate-700">
                <div class="text-xs text-slate-500 mb-1">출석 시각</div>
                <div class="text-2xl font-mono font-bold text-fuchsia-400">${state.time}</div>
              </div>

              <button onclick="resetForm()"
                class="w-full bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-xl transition-colors text-base">
                다음 학생
              </button>
            </div>
          </div>
        `;
      },

      // ── 이미 출석 ──
      already() {
        return `
          <div class="fade-in bg-slate-800 rounded-2xl overflow-hidden border border-amber-500/30 shadow-2xl">
            <div class="h-1 bg-gradient-to-r from-amber-500 to-orange-500"></div>
            <div class="p-8 text-center">
              <div class="w-20 h-20 mx-auto mb-5 rounded-full bg-amber-500/20 border-2 border-amber-500/40 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-400"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              </div>
              <h2 class="text-2xl font-bold text-amber-400 mb-1">이미 출석했어요</h2>
              <p class="text-white text-xl font-semibold mb-4">${state.name} 학생</p>
              <p class="text-slate-400 text-sm bg-slate-900 rounded-xl px-4 py-3 border border-slate-700 inline-block mb-6">
                오늘 <span class="text-amber-300 font-semibold">${state.time}</span>에 이미 출석 처리되었습니다.
              </p>
              <button onclick="resetForm()"
                class="w-full bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-xl transition-colors text-base">
                돌아가기
              </button>
            </div>
          </div>
        `;
      },

      // ── 명단 없음 ──
      not_found() {
        return `
          <div class="fade-in bg-slate-800 rounded-2xl overflow-hidden border border-red-500/30 shadow-2xl">
            <div class="h-1 bg-gradient-to-r from-red-500 to-rose-500"></div>
            <div class="p-8 text-center">
              <div class="w-20 h-20 mx-auto mb-5 rounded-full bg-red-500/20 border-2 border-red-500/40 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-400"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>
              </div>
              <h2 class="text-2xl font-bold text-red-400 mb-2">명단 미확인</h2>
              <div class="bg-slate-900 rounded-xl p-4 mb-6 border border-slate-700 text-left text-sm space-y-2">
                <p class="text-slate-400">입력하신 정보가 명단과 일치하지 않습니다.</p>
                <p class="text-slate-500">• 학번: <span class="text-slate-300">${state.id}</span></p>
                <p class="text-slate-500">• 이름: <span class="text-slate-300">${state.name}</span></p>
                <p class="text-amber-400/80 text-xs mt-3">오탈자가 없는지 확인하거나, 선생님께 문의해 주세요.</p>
              </div>
              <button onclick="resetForm()"
                class="w-full bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-xl transition-colors text-base">
                다시 입력하기
              </button>
            </div>
          </div>
        `;
      },

      // ── 서버 오류 ──
      error() {
        return `
          <div class="fade-in bg-slate-800 rounded-2xl overflow-hidden border border-slate-600 shadow-2xl">
            <div class="h-1 bg-slate-600"></div>
            <div class="p-8 text-center">
              <div class="w-20 h-20 mx-auto mb-5 rounded-full bg-slate-700 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
              </div>
              <h2 class="text-xl font-bold text-slate-300 mb-2">연결 오류</h2>
              <p class="text-slate-400 text-sm mb-6">${state.errorMsg}</p>
              <button onclick="resetForm()"
                class="w-full bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-xl transition-colors text-base">
                다시 시도하기
              </button>
            </div>
          </div>
        `;
      }
    };

    // ── 핸들러 ──
    async function handleSubmit() {
      const idEl   = document.getElementById("inp-id");
      const nameEl = document.getElementById("inp-name");
      const id     = idEl   ? idEl.value.trim()   : "";
      const name   = nameEl ? nameEl.value.trim()  : "";

      if (!id || !name) {
        state.id   = id;
        state.name = name;
        state.validationError = "학번과 이름을 모두 입력해주세요.";
        render();
        return;
      }

      state.id   = id;
      state.name = name;
      state.validationError = "";
      state.screen = "loading";
      render();

      try {
        const url = `${SCRIPT_URL}?action=check&id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}`;
        const res  = await fetch(url, { redirect: "follow" });
        const data = await res.json();

        if (data.status === "success") {
          state.screen = "success";
          state.time   = data.time || "";
        } else if (data.status === "already") {
          state.screen = "already";
          state.time   = data.time || "";
        } else if (data.status === "not_found") {
          state.screen = "not_found";
        } else {
          state.screen   = "error";
          state.errorMsg = data.message || "알 수 없는 오류가 발생했습니다.";
        }
      } catch (e) {
        state.screen   = "error";
        state.errorMsg = "서버와 통신 중 오류가 발생했습니다. 선생님께 문의해 주세요.";
        console.error(e);
      }

      render();
    }

    function resetForm() {
      state = { screen: "form", id: "", name: "", time: "", errorMsg: "", validationError: "" };
      render();
    }

    // ── 시작 ──
    render();
  </script>
</body>
</html>
